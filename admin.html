<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRHVAC MX | Panel Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-12">

    <div id="pantalla-login" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-50 px-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <span class="text-4xl">🔒</span>
            <h2 class="font-title font-black text-xl text-white mt-4 mb-2">Acceso Restringido</h2>
            <p class="text-slate-500 text-xs mb-6">Introduce la llave maestra de AIRHVAC MX</p>
            
            <input type="password" id="pass-input" placeholder="Contraseña Secreta" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-center focus:ring-2 focus:ring-[#0e73b9] focus:outline-none mb-4 font-bold tracking-widest text-white">
            <button onclick="verificarAcceso()" class="w-full bg-[#0e73b9] hover:bg-[#0b5c94] text-white font-bold py-3 rounded-xl text-sm transition-all shadow-lg">
                Ingresar al Panel
            </button>
            <p id="error-login" class="text-rose-500 text-xs font-bold mt-4 hidden">❌ Contraseña incorrecta o sin acceso.</p>
        </div>
    </div>

    <div id="panel-principal" class="hidden">
        <header class="bg-slate-900 border-b border-slate-800 py-6 mb-8 shadow-md">
            <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
                <h1 class="font-title font-black text-2xl tracking-tight text-white flex items-center gap-3">
                    <span class="text-[#0e73b9]">⚡</span> AIRHVAC MX <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-full font-bold border border-emerald-500/20">Conexión Segura</span>
                </h1>
                <button onclick="cargarSolicitudes()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-xs px-5 py-2.5 rounded-xl transition-all border border-slate-700">
                    🔄 Actualizar Datos
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6">
            <div id="contador" class="text-slate-400 text-sm font-bold mb-6">Analizando registros...</div>
            <div id="contenedor-leads" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <script>
        const supabaseUrl = 'https://kvntozwuwnyluzqxzqsp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bnRvend1d255bHV6cXh6cXNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTg0MjgsImV4cCI6MjA5NzU3NDQyOH0.nS3uqEYmrIRqF8y4p4V5fKTCXeRxZKXoB-iOJyIdOxo';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        let contrasenaMaestra = "";

        // Al presionar Enter en el input
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificarAcceso();
        });

        async function verificarAcceso() {
            const input = document.getElementById('pass-input').value;
            const errorTxt = document.getElementById('error-login');
            
            // Intentamos llamar a la función segura usando la contraseña escrita
            const { data, error } = await supabaseClient.rpc('ver_solicitudes_seguras', { pass: input });

            if (error || !data || data.length === 0 && input !== 'AIRHVAC2026!') {
                errorTxt.classList.remove('hidden');
                return;
            }

            // Si dio acceso, guardamos la clave en memoria y abrimos el panel
            contrasenaMaestra = input;
            document.getElementById('pantalla-login').classList.add('hidden');
            document.getElementById('panel-principal').classList.remove('hidden');
            
            // Pintar los datos recibidos
            renderizarTarjetas(data);
        }

        async function cargarSolicitudes() {
            // Re-actualizar llamando a la función segura
            const { data, error } = await supabaseClient.rpc('ver_solicitudes_seguras', { pass: contrasenaMaestra });
            if (!error) renderizarTarjetas(data);
        }

        function renderizarTarjetas(data) {
            const contenedor = document.getElementById('contenedor-leads');
            const contador = document.getElementById('contador');
            
            contador.innerHTML = `Tienes <span class="text-white font-black">${data.length}</span> solicitudes resguardadas.`;
            contenedor.innerHTML = '';

            if(data.length === 0) {
                contenedor.innerHTML = '<div class="col-span-full text-center py-12 text-slate-500 font-bold">No hay registros pendientes.</div>';
                return;
            }

            data.forEach(lead => {
                const fecha = lead.fecha_solicitud ? new Date(lead.fecha_solicitud).toLocaleString('es-MX') : 'No registrada';
                
                contenedor.innerHTML += `
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl relative group hover:border-[#0e73b9]/40 transition-all duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider bg-blue-500/10 text-blue-400 border border-blue-500/10">
                                ${lead.servicio_requerido || 'General'}
                            </span>
                            <span class="text-[10px] text-slate-500 font-bold">${fecha}</span>
                        </div>
                        
                        <h3 class="text-lg font-bold text-white mb-1 truncate">${lead.nombre}</h3>
                        
                        <div class="space-y-2 my-4 text-sm font-medium text-slate-300 border-y border-slate-800 py-3">
                            <p class="flex items-center gap-2"><span class="text-slate-600 text-xs">📞</span> <a href="tel:${lead.telefono}" class="hover:text-blue-400 transition-colors">${lead.telefono}</a></p>
                            <p class="flex items-center gap-2 truncate"><span class="text-slate-600 text-xs">✉️</span> <a href="mailto:${lead.correo}" class="hover:text-blue-400 transition-colors">${lead.correo}</a></p>
                        </div>

                        <div class="mb-6">
                            <h4 class="text-[10px] uppercase font-black tracking-widest text-slate-500 mb-1">Detalles comerciales:</h4>
                            <p class="text-xs text-slate-400 leading-relaxed bg-slate-950 p-3 rounded-xl min-h-[50px] border border-slate-800 font-medium">
                                ${lead.detalles || '<i>El cliente no dejó comentarios adicionales.</i>'}
                            </p>
                        </div>

                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <a href="https://wa.me/${lead.telefono.replace(/\s+/g, '')}" target="_blank" class="flex items-center justify-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2.5 rounded-xl transition-colors shadow-sm">
                                WhatsApp
                            </a>
                            <a href="tel:${lead.telefono}" class="flex items-center justify-center gap-1.5 bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs py-2.5 rounded-xl transition-colors border border-slate-700/60">
                                Llamar
                            </a>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
